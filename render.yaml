services:
  - type: web
    name: leadgen-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    env:
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      SMTP_USE_TLS: "true"
    runtime: python
    repo: https://github.com/Div0011/LeadGen
    rootDir: backend