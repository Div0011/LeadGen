services:
  - type: postgres
    name: leadgen-db
    plan: free
    env:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: leadgen

  - type: web
    name: leadgen-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    env:
      - DATABASE_URL: postgres://postgres:${DB_PASSWORD}@leadgen-db:5432/leadgen
      - SMTP_HOST: smtp.gmail.com
      - SMTP_PORT: "587"
      - SMTP_USE_TLS: "true"
    runtime: python
    repo: https://github.com/Div0011/LeadGen
    rootDir: backend
    depends_on:
      - leadgen-db